<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda da Dra. Maíra Vilela</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f2f6fa;
    color: #2c3e50;
}

/* HEADER */
header {
    background: linear-gradient(135deg, #1e90ff, #1c5fa8);
    color: white;
    padding: 30px;
    display: flex;
    align-items: center;
    gap: 25px;
}

header img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    background: white;
}

nav {
    background: white;
    padding: 15px;
    display: flex;
    gap: 20px;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.1);
}

nav button {
    padding: 10px 22px;
    border: none;
    background: #1e90ff;
    color: white;
    border-radius: 25px;
    cursor: pointer;
}

main { padding: 30px; }

section {
    display: none;
    background: white;
    padding: 25px;
    border-radius: 10px;
    max-width: 900px;
    margin: auto;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
}

section.active { display: block; }

label { display: block; margin-top: 12px; }
input, textarea { width: 100%; padding: 8px; }

button.action {
    margin-top: 20px;
    padding: 10px 18px;
    background: #1e90ff;
    color: white;
    border: none;
    border-radius: 6px;
}

.ficha {
    background: #f7f9fc;
    border-left: 6px solid #1e90ff;
    padding: 15px;
    border-radius: 6px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<header>
    <img src="img/dra_mairavilela.jpg" alt="Dra. Maíra Vilela">
    <div>
        <h1>Dra. Maíra Vilela</h1>
        <p>Cirurgiã Vascular</p>
        <p>Brasília – DF</p>
        <p>(61) 98589‑5499</p>
    </div>
</header>

<nav>
    <button onclick="mostrar('agendaLogin')">Agenda</button>
    <button onclick="mostrar('prontuarioLogin')">Prontuários</button>
</nav>

<main>

<!-- LOGIN AGENDA -->
<section id="agendaLogin" class="active">
    <h2>Agenda da Dra. Maíra Vilela</h2>
    <label>Senha da Agenda</label>
    <input type="password" id="senhaAgenda">
    <button class="action" onclick="liberarAgenda()">Entrar</button>
</section>

<!-- AGENDA -->
<section id="agenda">
    <h2>📅 Agenda</h2>
    <label>Data</label>
    <input type="date">
    <label>Horário</label>
    <input type="time">
    <label>Local / Clínica / Hospital</label>
    <input>
    <label>Observações</label>
    <textarea></textarea>
    <button class="action">Salvar Agendamento</button>
</section>

<!-- LOGIN PRONTUÁRIO -->
<section id="prontuarioLogin">
    <h2>Acesso ao Prontuário</h2>
    <label>Senha do Prontuário</label>
    <input type="password" id="senhaProntuario">
    <button class="action" onclick="liberarProntuario()">Entrar</button>
</section>

<!-- PRONTUÁRIO -->
<section id="prontuario">
    <h2>Prontuário do Paciente</h2>

    <label>Nome do Paciente</label>
    <input id="nomePaciente">

    <label>CPF</label>
    <input id="cpfPaciente">

    <label>Data</label>
    <input type="date" id="dataRegistro">

    <label>Sintomas</label>
    <textarea id="sintomas"></textarea>

    <label>Diagnóstico</label>
    <textarea id="diagnostico"></textarea>

    <label>Tratamento</label>
    <textarea id="tratamento"></textarea>

    <button class="action" onclick="salvarProntuario()">Salvar Prontuário</button>

    <h3>Histórico do Paciente</h3>
    <div id="historico"></div>
</section>

</main>

<script>
const SENHA_AGENDA = "agenda123";
const SENHA_PRONTUARIO = "prontuario123";

function mostrar(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function liberarAgenda(){
    if(senhaAgenda.value === SENHA_AGENDA){
        mostrar("agenda");
    } else alert("Senha incorreta");
}

function liberarProntuario(){
    if(senhaProntuario.value === SENHA_PRONTUARIO){
        mostrar("prontuario");
    } else alert("Senha incorreta");
}

function salvarProntuario(){
    const cpf = cpfPaciente.value.replace(/\D/g,'');
    if(!cpf) return alert("Informe o CPF");

    const id = "paciente_"+cpf;
    let dados = JSON.parse(localStorage.getItem(id)) || [];

    dados.push({
        data: dataRegistro.value,
        nome: nomePaciente.value,
        sintomas: sintomas.value,
        diagnostico: diagnostico.value,
        tratamento: tratamento.value
    });

    dados.sort((a,b)=>b.data.localeCompare(a.data));
    localStorage.setItem(id, JSON.stringify(dados));
    carregarHistorico(id);
}

function carregarHistorico(id){
    const div = document.getElementById("historico");
    div.innerHTML="";
    const dados = JSON.parse(localStorage.getItem(id))||[];
    dados.forEach(r=>{
        div.innerHTML += `<div class="ficha">
            <strong>${r.data}</strong><br>
            <b>Sintomas:</b> ${r.sintomas}<br>
            <b>Diagnóstico:</b> ${r.diagnostico}<br>
            <b>Tratamento:</b> ${r.tratamento}
        </div>`;
    });
}
</script>

</body>
</html>
