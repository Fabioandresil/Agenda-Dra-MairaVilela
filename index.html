<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda – Dra. Maíra Vilela</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef2f7;
}

/* HEADER */
header {
    background: linear-gradient(135deg,#1e90ff,#1c5fa8);
    color: white;
    padding: 25px;
    display: flex;
    align-items: center;
    gap: 20px;
}

header img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
}

/* NAV */
nav {
    background: white;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,.1);
}

nav button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #1e90ff;
    color: white;
}

/* SEÇÕES */
section {
    max-width: 1100px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    display: none;
}

section.active {
    display: block;
}

/* CALENDÁRIO */
#calendar {
    display: grid;
    grid-template-columns: 80px repeat(14, 1fr);
    gap: 1px;
    background: #ccc;
    margin-top: 20px;
    font-size: 12px;
}

.cell {
    background: white;
    height: 40px;
    padding: 4px;
    text-align: center;
}

.hora {
    background: #f0f0f0;
    font-weight: bold;
}

.header {
    background: #e0e0e0;
    font-weight: bold;
}

.disponivel {
    background: #e8f5e9;
}
</style>
</head>

<body>

<header>
    <!-- ✅ FOTO CORRIGIDA -->
    <img src="img/dra_mairavilela.jpg" alt="Dra. Maíra Vilela">
    <div>
        <h1>Dra. Maíra Vilela</h1>
        <p>Cirurgiã Vascular – Brasília</p>
        <p>(61) 98589‑5499</p>
    </div>
</header>

<nav>
    <button onclick="abrirAgendaLogin()">Agenda</button>
    <button onclick="abrirProntuarioLogin()">Prontuários</button>
</nav>

<!-- LOGIN AGENDA -->
<section id="agendaLogin" class="active">
    <h2>Agenda – Acesso</h2>
    <label>Senha:</label><br>
    <input type="password" id="senhaAgenda"><br><br>
    <button onclick="entrarAgenda()">Entrar</button>
</section>

<!-- AGENDA -->
<section id="agenda">
    <h2>Agenda – Próximas 2 semanas</h2>
    <div id="calendar"></div>
</section>

<!-- LOGIN PRONTUÁRIO -->
<section id="prontuarioLogin">
    <h2>Prontuários – Acesso</h2>
    <label>Senha:</label><br>
    <input type="password" id="senhaProntuario"><br><br>
    <button onclick="entrarProntuario()">Entrar</button>
</section>

<!-- PRONTUÁRIO (placeholder) -->
<section id="prontuario">
    <h2>📁 Prontuário do Paciente</h2>

    <h3>Identificação</h3>

    <label>Nome do paciente</label>
    <input id="p_nome">

    <label>CPF</label>
    <input id="p_cpf">

    <label>Data de nascimento</label>
    <input type="date" id="p_nascimento">

    <label>Telefone</label>
    <input id="p_telefone">

    <label>Peso (kg)</label>
    <input id="p_peso">

    <label>Altura (cm)</label>
    <input id="p_altura">

    <label>Tipo sanguíneo</label>
    <input id="p_sangue">

    <label>Doenças pré-existentes</label>
    <textarea id="p_doencas"></textarea>

    <hr>

    <h3>Novo Atendimento</h3>

    <label>Data de atendimento</label>
    <input type="date" id="a_data">

    <label>Tipo de atendimento</label>
    <select id="a_tipo" onchange="toggleCirurgia()">
        <option value="consulta">Consulta</option>
        <option value="sessao">Sessão</option>
        <option value="cirurgia">Cirurgia</option>
    </select>

    <label>Evolução / Observações</label>
    <textarea id="a_obs"></textarea>

    <label>Data de retorno</label>
    <input type="date" id="a_retorno">

    <!-- CAMPOS DE CIRURGIA -->
    <div id="cirurgiaCampos" style="display:none">

        <h4>Informações da Cirurgia</h4>

        <label>Hospital</label>
        <input id="c_hospital">

        <label>Médico principal</label>
        <input id="c_principal">

        <label>Médico assistente</label>
        <input id="c_assistente">

        <label>Plano de saúde</label>
        <input id="c_plano">

        <label>Valor (PIX)</label>
        <input type="number" id="c_valor">

        <label>Forma de pagamento</label>
        <select id="c_pagamento" onchange="calcularPagamento()">
            <option value="pix">PIX</option>
            <option value="3x">Cartão 3x (+3%)</option>
            <option value="6x">Cartão 6x (+5%)</option>
            <option value="10x">Cartão 10x (+10%)</option>
        </select>

        <p id="resultadoPagamento"></p>

        <label>Status do pagamento</label>
        <select id="c_pago">
            <option value="nao">Não pago</option>
            <option value="sim">Pago</option>
        </select>
    </div>

    <button onclick="salvarProntuario()">Salvar Atendimento</button>

    <hr>

    <h3>📚 Histórico</h3>
    <div id="historico"></div>
</section>
``

<script>
const SENHA_AGENDA = "agenda123";
const SENHA_PRONTUARIO = "prontuario123";

function mostrar(id){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function abrirAgendaLogin(){
    mostrar("agendaLogin");
}

function entrarAgenda(){
    if (senhaAgenda.value === SENHA_AGENDA) {
        mostrar("agenda");
        gerarAgenda();
    } else {
        alert("Senha incorreta");
    }
}

function abrirProntuarioLogin(){
    mostrar("prontuarioLogin");
}

function entrarProntuario(){
    if (senhaProntuario.value === SENHA_PRONTUARIO) {
        mostrar("prontuario");
    } else {
        alert("Senha incorreta");
    }
}

function gerarAgenda(){
    const calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    const hoje = new Date();
    const dias = [];

    for (let i = 0; i < 14; i++) {
        const d = new Date(hoje);
        d.setDate(d.getDate() + i);
        dias.push(d);
    }

    calendar.appendChild(document.createElement("div"));

    dias.forEach(d => {
        const h = document.createElement("div");
        h.className = "cell header";
        h.innerText = d.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"2-digit"});
        calendar.appendChild(h);
    });

    for (let h = 8; h <= 18; h++) {
        const hora = document.createElement("div");
        hora.className = "cell hora";
        hora.innerText = h + ":00";
        calendar.appendChild(hora);

        dias.forEach(() => {
            const c = document.createElement("div");
            c.className = "cell disponivel";
            calendar.appendChild(c);
        });
    }
function toggleCirurgia() {
    cirurgiaCampos.style.display =
        a_tipo.value === "cirurgia" ? "block" : "none";
}

function calcularPagamento() {
    const valor = parseFloat(c_valor.value || 0);
    let fator = 1, parcelas = 1;

    if (c_pagamento.value === "3x") { fator = 1.03; parcelas = 3; }
    if (c_pagamento.value === "6x") { fator = 1.05; parcelas = 6; }
    if (c_pagamento.value === "10x") { fator = 1.10; parcelas = 10; }

    const total = (valor * fator).toFixed(2);
    const parcela = (total / parcelas).toFixed(2);

    resultadoPagamento.innerText =
        `Total: R$ ${total} | ${parcelas}x de R$ ${parcela}`;
}

function salvarProntuario() {
    const cpf = p_cpf.value.replace(/\D/g,"");
    if (!cpf) return alert("Informe o CPF");

    const id = "paciente_" + cpf;
    let dados = JSON.parse(localStorage.getItem(id) || "[]");

    dados.push({
        data: a_data.value,
        tipo: a_tipo.value,
        obs: a_obs.value,
        retorno: a_retorno.value,
        cirurgia: a_tipo.value === "cirurgia" ? {
            hospital: c_hospital.value,
            principal: c_principal.value,
            assistente: c_assistente.value,
            plano: c_plano.value,
            valor: c_valor.value,
            pagamento: c_pagamento.value,
            pago: c_pago.value
        } : null
    });

    dados.sort((a,b)=>b.data.localeCompare(a.data));
    localStorage.setItem(id, JSON.stringify(dados));
    renderHistorico(id);
}

function renderHistorico(id) {
    const dados = JSON.parse(localStorage.getItem(id) || "[]");
    historico.innerHTML = "";

    dados.forEach(d => {
        historico.innerHTML += `
            <div class="cell" style="margin-bottom:10px">
                <b>${d.data}</b> — ${d.tipo}<br>
                ${d.obs}<br>
                Retorno: ${d.retorno || "-"}
            </div>
        `;
    });
}

}
</script>

</body>
</html>
``
