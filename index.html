<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda Médica – Dra. Maíra Vilela</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f2f6fa;
    color: #2c3e50;
}

/* ===== HEADER ===== */
header {
    background: linear-gradient(135deg, #1e90ff, #1c5fa8);
    color: white;
    padding: 30px;
    display: flex;
    align-items: center;
    gap: 25px;
}

header img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    background: white;
}

header h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 600;
}

header p {
    margin: 4px 0;
    font-size: 14px;
}

/* ===== MENU ===== */
nav {
    background: white;
    padding: 15px;
    display: flex;
    gap: 20px;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.1);
}

nav button {
    padding: 10px 22px;
    border: none;
    background: #1e90ff;
    color: white;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
}

nav button:hover {
    background: #155fa0;
}

/* ===== CONTEÚDO ===== */
main {
    padding: 30px;
}

section {
    display: none;
    background: white;
    padding: 25px;
    border-radius: 10px;
    max-width: 900px;
    margin: auto;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
}

section.active {
    display: block;
}

label {
    display: block;
    margin-top: 12px;
    font-weight: 500;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 4px;
    border: 1px solid #ccc;
}

textarea {
    resize: vertical;
}

button.action {
    margin-top: 20px;
    padding: 10px 18px;
    border: none;
    background: #1e90ff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button.action:hover {
    background: #155fa0;
}

/* ===== HISTÓRICO ===== */
.hist-bloco {
    background: #f7f9fc;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
}

.hist-bloco img {
    max-width: 120px;
    border-radius: 6px;
    margin: 5px;
}
</style>
</head>

<body>

<!-- ✅ HEADER CORRIGIDO -->
<header>
    <img src="img/dra_mairavilela.jpg" alt="Dra. Maíra Vilela">
    <div>
        <h1>Dra. Maíra Vilela</h1>
        <p>Cirurgiã Vascular</p>
        <p>Brasília – DF</p>
