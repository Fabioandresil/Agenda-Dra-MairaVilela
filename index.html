<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda – Dra. Maíra Vilela</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef2f7;
}

/* HEADER */
header {
  background: linear-gradient(135deg,#1e90ff,#1c5fa8);
  color: white;
  padding: 25px;
  display: flex;
  align-items: center;
  gap: 20px;
}

header img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 4px solid white;
  object-fit: cover;
}

/* NAV */
nav {
  background: white;
  padding: 15px;
  display: flex;
  justify-content: center;
  gap: 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,.1);
}

nav button {
  padding: 10px 22px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: #1e90ff;
  color: white;
}

/* SECTIONS */
section {
  max-width: 1200px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
  display: none;
}
section.active { display: block; }

label { margin-top: 10px; display:block; }
input, textarea, select {
  width: 100%;
  padding: 8px;
}

/* CALENDAR */
#calendar {
  display: grid;
  grid-template-columns: 80px repeat(14, 1fr);
  background: #ccc;
  gap: 1px;
  margin-top: 20px;
  font-size: 12px;
}
.cell {
  background: white;
  min-height: 40px;
  text-align: center;
  cursor: pointer;
}
.hora { background:#f0f0f0;font-weight:bold }
.header { background:#e0e0e0;font-weight:bold }
.disponivel { background:#e8f5e9 }
.consulta { background:#bbdefb }
.sessao { background:#dcedc8 }
.cirurgia { background:#ffcdd2 }

/* MODAL */
#modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.4);
}
#modalBox {
  background:white;
  max-width:400px;
  margin:10% auto;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <img src="img/dra_mairavilela.jpg">
  <div>
    <h1>Dra. Maíra Vilela</h1>
    <p>Cirurgiã Vascular – Brasília</p>
    <p>(61) 98589‑5499</p>
  </div>
</header>

<nav>
  <button onclick="show('agendaLogin')">Agenda</button>
  <button onclick="show('prontuarioLogin')">Prontuários</button>
</nav>

<!-- LOGIN AGENDA -->
<section id="agendaLogin" class="active">
<h2>Agenda – Acesso</h2>
<label>Senha</label>
<input type="password" id="senhaAgenda">
<button onclick="entrarAgenda()">Entrar</button>
</section>

<!-- AGENDA -->
<section id="agenda">
<h2>📅 Agenda – Próximas 2 semanas</h2>
<div id="calendar"></div>
</section>

<!-- LOGIN PRONTUÁRIO -->
<section id="prontuarioLogin">
<h2>Prontuário – Acesso</h2>
<label>Senha</label>
<input type="password" id="senhaProntuario">
<button onclick="entrarProntuario()">Entrar</button>
</section>

<!-- PRONTUÁRIO -->
<section id="prontuario">
<h2>📁 Prontuário</h2>

<label>Nome</label><input id="p_nome">
<label>CPF</label><input id="p_cpf">
<label>Data nascimento</label><input type="date" id="p_nasc">

<hr>

<label>Data atendimento</label><input type="date" id="a_data">
<label>Tipo</label>
<select id="a_tipo" onchange="toggleCirurgia()">
  <option value="consulta">Consulta</option>
  <option value="sessao">Sessão</option>
  <option value="cirurgia">Cirurgia</option>
</select>

<label>Observações</label>
<textarea id="a_obs"></textarea>

<label>Data retorno</label>
<input type="date" id="a_retorno">

<div id="cirurgiaCampos" style="display:none">
  <h3>Cirurgia</h3>
  <label>Hospital</label><input id="c_hospital">
  <label>Médico principal</label><input id="c_principal">
  <label>Médico assistente</label><input id="c_assistente">
  <label>Plano de saúde</label><input id="c_plano">
  <label>Valor PIX</label><input type="number" id="c_valor">
  <label>Pagamento</label>
  <select id="c_pagamento" onchange="calcularPagamento()">
    <option value="pix">PIX</option>
    <option value="3x">3x (+3%)</option>
    <option value="6x">6x (+5%)</option>
    <option value="10x">10x (+10%)</option>
  </select>
  <p id="resPagamento"></p>
  <label>Status</label>
  <select id="c_pago">
    <option value="nao">Não pago</option>
    <option value="sim">Pago</option>
  </select>
</div>

<button onclick="salvarProntuario()">Salvar</button>

<hr>
<h3>Histórico</h3>
<div id="historico"></div>

</section>

<!-- MODAL AGENDA -->
<div id="modal">
  <div id="modalBox">
    <h3>Editar horário</h3>
    <label>Status</label>
    <select id="m_status">
      <option value="disponivel">Disponível</option>
      <option value="consulta">Consulta</option>
      <option value="sessao">Sessão</option>
      <option value="cirurgia">Cirurgia</option>
    </select>
    <label>Local</label>
    <input id="m_local">
    <button onclick="salvarSlot()">Salvar</button>
    <button onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<script>
const SENHA_AGENDA="agenda123",SENHA_PRONTUARIO="prontuario123";
let slotKey=null;

function show(id){
 document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function entrarAgenda(){
 if(senhaAgenda.value===SENHA_AGENDA){
  show("agenda"); gerarAgenda();
 } else alert("Senha incorreta");
}

function entrarProntuario(){
 if(senhaProntuario.value===SENHA_PRONTUARIO){
  show("prontuario");
 } else alert("Senha incorreta");
}

function gerarAgenda(){
 calendar.innerHTML="";
 const hoje=new Date(),dados=JSON.parse(localStorage.getItem("agenda")||"{}");
 const dias=[...Array(14)].map((_,i)=>new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate()+i));

 calendar.appendChild(document.createElement("div"));
 dias.forEach(d=>{
  let h=document.createElement("div");
  h.className="cell header";
  h.innerText=d.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"2-digit"});
  calendar.appendChild(h);
 });

 for(let h=8;h<=18;h++){
  let hh=document.createElement("div");
  hh.className="cell hora";hh.innerText=h+":00";
  calendar.appendChild(hh);
  dias.forEach(d=>{
    let k=d.toISOString().slice(0,10)+"_"+h;
    let c=document.createElement("div");
    c.className="cell "+(dados[k]?.status||"disponivel");
    c.innerText=dados[k]?.local||"";
    c.onclick=()=>abrirModal(k);
    calendar.appendChild(c);
  });
 }
}

function abrirModal(k){ slotKey=k; modal.style.display="block"; }
function fecharModal(){ modal.style.display="none"; }

function salvarSlot(){
 let dados=JSON.parse(localStorage.getItem("agenda")||"{}");
 dados[slotKey]={status:m_status.value,local:m_local.value};
 localStorage.setItem("agenda",JSON.stringify(dados));
 fecharModal();gerarAgenda();
}

function toggleCirurgia(){
 cirurgiaCampos.style.display = a_tipo.value==="cirurgia"?"block":"none";
}

function calcularPagamento(){
 let v=Number(c_valor.value),f=1,p=1;
 if(c_pagamento.value==="3x"){f=1.03;p=3}
 if(c_pagamento.value==="6x"){f=1.05;p=6}
 if(c_pagamento.value==="10x"){f=1.10;p=10}
 let t=(v*f).toFixed(2);
 resPagamento.innerText=`Total R$ ${t} — ${p}x de R$ ${(t/p).toFixed(2)}`;
}

function salvarProntuario(){
 let id="pac_"+p_cpf.value.replace(/\D/g,"");
 let arr=JSON.parse(localStorage.getItem(id)||"[]");
 arr.push({data:a_data.value,tipo:a_tipo.value,obs:a_obs.value});
 localStorage.setItem(id,JSON.stringify(arr));
 historico.innerHTML+=`<div><b>${a_data.value}</b> - ${a_tipo.value}</div>`;
}
</script>

</body>
</html>
