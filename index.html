<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda – Dra. Maíra Vilela</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef2f7;
}

/* HEADER */
header {
  background: linear-gradient(135deg,#1e90ff,#1c5fa8);
  color: white;
  padding: 25px;
  display: flex;
  align-items: center;
  gap: 20px;
}

header img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 4px solid white;
  object-fit: cover;
}

/* NAV */
nav {
  background: white;
  padding: 15px;
  display: flex;
  justify-content: center;
  gap: 20px;
  box-shadow: 0 2px 5px rgba(0,0,0,.1);
}

nav button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: #1e90ff;
  color: white;
}

/* SEÇÕES */
section {
  max-width: 1200px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
  display: none;
}

section.active {
  display: block;
}

/* CALENDÁRIO */
#calendar {
  display: grid;
  grid-template-columns: 80px repeat(14, 1fr);
  gap: 1px;
  margin-top: 20px;
  background: #ccc;
  font-size: 12px;
}

.cell {
  background: white;
  min-height: 40px;
  padding: 4px;
  text-align: center;
}

.hora {
  background: #f0f0f0;
  font-weight: bold;
}

.header {
  background: #e0e0e0;
  font-weight: bold;
}

.disponivel {
  background: #e8f5e9;
}

/* FORM */
label {
  display: block;
  margin-top: 10px;
}

input, textarea, select {
  width: 100%;
  padding: 8px;
}

button.action {
  margin-top: 15px;
  padding: 10px;
  border: none;
  background: #1e90ff;
  color: white;
  border-radius: 6px;
}
</style>
</head>

<body>

<header>
  <img src="img/dra_mairavilela.jpg" alt="Dra. Maíra Vilela">
  <div>
    <h1>Dra. Maíra Vilela</h1>
    <p>Cirurgiã Vascular – Brasília</p>
    <p>(61) 98589‑5499</p>
  </div>
</header>

<nav>
  <button onclick="mostrar('agendaLogin')">Agenda</button>
  <button onclick="mostrar('prontuarioLogin')">Prontuários</button>
</nav>

<!-- LOGIN AGENDA -->
<section id="agendaLogin" class="active">
  <h2>Agenda – Acesso</h2>
  <label>Senha</label>
  <input type="password" id="senhaAgenda">
  <button class="action" onclick="entrarAgenda()">Entrar</button>
</section>

<!-- AGENDA -->
<section id="agenda">
  <h2>📅 Agenda – Próximas 2 semanas</h2>
  <div id="calendar"></div>
</section>

<!-- LOGIN PRONTUÁRIO -->
<section id="prontuarioLogin">
