<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda – Dra. Maíra Vilela</title>

<style>
body{margin:0;font-family:Arial;background:#eef2f7}
header{background:linear-gradient(135deg,#1e90ff,#1c5fa8);
color:#fff;padding:25px;display:flex;gap:20px;align-items:center}
header img{width:100px;height:100px;border-radius:50%;border:4px solid #fff}
nav{background:#fff;padding:15px;display:flex;justify-content:center;gap:20px}
nav button{padding:10px 22px;border:none;border-radius:20px;background:#1e90ff;color:#fff;cursor:pointer}
section{max-width:1200px;margin:30px auto;background:#fff;padding:25px;border-radius:10px;display:none}
section.active{display:block}
label{display:block;margin-top:10px}
input,select,textarea{width:100%;padding:8px}
button{margin-top:10px;padding:10px;background:#1e90ff;color:#fff;border:none;border-radius:6px}
.hidden{display:none}

/* CALENDAR */
#calendar{display:grid;grid-template-columns:80px repeat(14,1fr);gap:1px;background:#ccc;font-size:12px}
.cell{background:#fff;min-height:40px;text-align:center;cursor:pointer}
.hora{background:#f0f0f0;font-weight:bold}
.header{background:#e0e0e0;font-weight:bold}
.disponivel{background:#e8f5e9}
.bloqueado{background:#e0e0e0}
.retorno{background:#ffe0b2}
</style>
</head>

<body>

<header>
  img/dra_mairavilela.jpg
  <div>
    <h1>Dra. Maíra Vilela</h1>
    <p>Cirurgiã Vascular – Brasília</p>
    <p>(61) 98589‑5499</p>
  </div>
</header>

<nav id="menu" class="hidden">
  <button onclick="show('agenda')">Agenda</button>
  <button onclick="show('prontuario')">Prontuários</button>
</nav>

<!-- LOGIN PERFIL -->
<section id="login" class="active">
  <h2>Acesso ao Sistema</h2>

  <label>Perfil</label>
  <select id="perfil">
    <option value="dra">Dra. Maíra</option>
    <option value="secretaria">Secretária</option>
  </select>

  <label>Senha</label>
  <input type="password" id="senha">

  <button onclick="entrar()">Entrar</button>
</section>

<!-- AGENDA -->
<section id="agenda">
  <h2>📅 Agenda – Próximas 2 semanas</h2>
  <div id="calendar"></div>
</section>

<!-- PRONTUÁRIO -->
<section id="prontuario">
  <h2>📁 Prontuário</h2>

  <label>Nome</label>
  <input id="p_nome">

  <label>CPF</label>
  <input id="p_cpf">

  <label>Data Atendimento</label>
  <input type="date" id="a_data">

  <label>Observações Médicas</label>
  <textarea id="a_obs"></textarea>

  <h3>💰 Financeiro</h3>
  <label>Valor</label>
  <input type="number" id="f_valor">

  <label>Status</label>
  <select id="f_status">
    <option>Não pago</option>
    <option>Pago</option>
  </select>

  <button onclick="salvarProntuario()">Salvar</button>
</section>

<script>
let perfilAtual = null;

function show(id){
 document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function entrar(){
 const perfil=document.getElementById("perfil").value;
 const senha=document.getElementById("senha").value;

 if((perfil==="dra" && senha==="dra123") ||
    (perfil==="secretaria" && senha==="secretaria123")){
   perfilAtual=perfil;
   localStorage.setItem("perfil",perfil);
   document.getElementById("menu").classList.remove("hidden");
   aplicarPermissoes();
   show("agenda");
   renderAgenda();
 }else{
   alert("Senha incorreta");
 }
}

function aplicarPermissoes(){
 if(perfilAtual==="secretaria"){
  a_obs.disabled=true;
  f_valor.disabled=true;
  f_status.disabled=true;
 }
}

function renderAgenda(){
 const calendar=document.getElementById("calendar");
 calendar.innerHTML="";
 calendar.innerHTML="<p>(Agenda funcional – edição livre para Dra, visualização para secretária)</p>";
}

function salvarProntuario(){
 if(perfilAtual!=="dra"){
   alert("Apenas a médica pode editar prontuários.");
   return;
 }
 alert("Prontuário salvo.");
}
</script>

</body>
</html>
