<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda – Dra. Maíra Vilela</title>

<style>
body{margin:0;font-family:Arial,sans-serif;background:#eef2f7}
header{
  background:linear-gradient(135deg,#1e90ff,#1c5fa8);
  color:#fff;padding:25px;display:flex;align-items:center;gap:20px
}
header img{
  width:100px;height:100px;border-radius:50%;
  border:4px solid #fff;object-fit:cover
}
nav{
  background:#fff;padding:15px;display:flex;justify-content:center;
  gap:20px;box-shadow:0 2px 5px rgba(0,0,0,.1)
}
nav button{
  padding:10px 20px;border-radius:20px;border:none;
  background:#1e90ff;color:#fff;cursor:pointer
}
section{
  max-width:1100px;margin:30px auto;background:#fff;
  padding:25px;border-radius:10px;display:none
}
section.active{display:block}
label{display:block;margin-top:10px}
input,textarea,select{width:100%;padding:8px}
button.action{
  margin-top:15px;padding:10px;border:none;
  background:#1e90ff;color:#fff;border-radius:6px
}
</style>
</head>

<body>

<header>
    <img src="img/dra_mairavilela.jpg">
    <div>
        <h1>Dra. Maíra Vilela</h1>
        <p>Cirurgiã Vascular – Brasília</p>
        <p>(61) 98589‑5499</p>
    </div>
</header>

<nav>
    <button onclick="mostrar('agendaLogin')">Agenda</button>
    <button onclick="mostrar('prontuarioLogin')">Prontuários</button>
</nav>

<!-- LOGIN AGENDA -->
<section id="agendaLogin" class="active">
<h2>Agenda – Acesso</h2>
<label>Senha</label>
<input type="password" id="senhaAgenda">
<button class="action" onclick="entrarAgenda()">Entrar</button>
</section>

<!-- AGENDA -->
<section id="agenda">
<h2>📅 Agenda – Próximas 2 semanas</h2>
<p>(Calendário já validado na etapa anterior)</p>
</section>

<!-- LOGIN PRONTUÁRIO -->
<section id="prontuarioLogin">
<h2>Prontuário – Acesso</h2>
<label>Senha</label>
<input type="password" id="senhaProntuario">
<button class="action" onclick="entrarProntuario()">Entrar</button>
</section>

<!-- PRONTUÁRIO COMPLETO -->
<section id="prontuario">
<h2>📁 Prontuário do Paciente</h2>

<h3>Identificação</h3>
<label>Nome</label><input id="p_nome">
<label>CPF</label><input id="p_cpf">
<label>Data de nascimento</label><input type="date" id="p_nasc">
<label>Telefone</label><input id="p_tel">
<label>Peso</label><input id="p_peso">
<label>Altura</label><input id="p_altura">
<label>Tipo sanguíneo</label><input id="p_sangue">
<label>Doenças pré-existentes</label><textarea id="p_doencas"></textarea>

<hr>

<h3>Novo Atendimento</h3>
<label>Data do atendimento</label><input type="date" id="a_data">
<label>Tipo</label>
<select id="a_tipo" onchange="toggleCirurgia()">
<option value="consulta">Consulta</option>
<option value="sessao">Sessão</option>
<option value="cirurgia">Cirurgia</option>
</select>

<label>Evolução / Observações</label>
<textarea id="a_obs"></textarea>

<label>Data de retorno</label><input type="date" id="a_retorno">

<div id="cirurgiaBox" style="display:none">
<h4>Cirurgia</h4>
<label>Hospital</label><input id="c_hospital">
<label>Médico principal</label><input id="c_principal">
<label>Médico assistente</label><input id="c_assistente">
<label>Valor (PIX)</label><input type="number" id="c_valor">
</div>

<button class="action" onclick="salvarProntuario()">Salvar Atendimento</button>

<h3>📚 Histórico</h3>
<div id="historico"></div>
</section>

<script>
const SENHA_AGENDA="agenda123",SENHA_PRONTUARIO="prontuario123";

function mostrar(id){
 document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

function entrarAgenda(){
 if(senhaAgenda.value===SENHA_AGENDA)mostrar("agenda");
 else alert("Senha incorreta");
}

function entrarProntuario(){
 if(senhaProntuario.value===SENHA_PRONTUARIO)mostrar("prontuario");
 else alert("Senha incorreta");
}

function toggleCirurgia(){
 cirurgiaBox.style.display = a_tipo.value==="cirurgia"?"block":"none";
}

function salvarProntuario(){
 const cpf=p_cpf.value.replace(/\D/g,"");
 if(!cpf)return alert("Informe o CPF");
 const id="paciente_"+cpf;
 let dados=JSON.parse(localStorage.getItem(id)||"[]");
 dados.push({
   data:a_data.value,
   tipo:a_tipo.value,
   obs:a_obs.value,
   retorno:a_retorno.value
 });
 localStorage.setItem(id,JSON.stringify(dados));
 renderHistorico(id);
}

function renderHistorico(id){
 const dados=JSON.parse(localStorage.getItem(id));
 historico.innerHTML="";
 dados.forEach(d=>{
  historico.innerHTML+=`
  <div style="border-left:4px solid #1e90ff;padding:10px;margin:10px 0">
   <b>${d.data}</b> — ${d.tipo}<br>${d.obs}<br>Retorno: ${d.retorno||"-"}
  </div>`;
 });
}
</script>

</body>
</html>
``
