<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda da Dra. Maíra Vilela</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f2f6fa;
}

/* HEADER */
header {
    background: linear-gradient(135deg,#1e90ff,#1c5fa8);
    color:white;
    padding:30px;
    display:flex;
    gap:25px;
    align-items:center;
}
header img{
    width:120px;height:120px;border-radius:50%;
    border:4px solid white;object-fit:cover;
}

/* MENU */
nav{
    background:white;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:20px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}
nav button{
    padding:10px 20px;
    background:#1e90ff;
    color:white;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* SEÇÕES */
main{padding:30px}
section{
    display:none;
    background:white;
    padding:25px;
    max-width:1100px;
    margin:auto;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,.08)
}
section.active{display:block}

/* CALENDÁRIO */
#calendar{
    display:grid;
    grid-template-columns:80px repeat(14,1fr);
    gap:1px;
    background:#ccc;
    margin-top:20px;
    font-size:12px;
}
.cell{
    background:#fff;
    padding:4px;
    height:40px;
    text-align:center;
    cursor:pointer;
}
.hora{
    font-weight:bold;
    background:#f0f0f0;
    cursor:default;
}

    background:#eee;
