<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda – Dra. Maíra Vilela</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef2f7;
}

/* HEADER */
header {
    background: linear-gradient(135deg,#1e90ff,#1c5fa8);
    color: white;
    padding: 25px;
    display: flex;
    align-items: center;
    gap: 20px;
}

header img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
}

/* NAV */
nav {
    background: white;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 20px;
    box-shadow: 0 2px 5px rgba(0,0,0,.1);
}

nav button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #1e90ff;
    color: white;
}

/* SEÇÕES */
section {
    max-width: 1100px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
    display: none;
}

section.active {
    display: block;
}

/* CALENDÁRIO */
#calendar {
    display: grid;
    grid-template-columns: 80px repeat(14, 1fr);
    gap: 1px;
    background: #ccc;
    margin-top: 20px;
    font-size: 12px;
}

.cell {
    background: white;
    height: 40px;
    padding: 4px;
    text-align: center;
}

.hora {
    background: #f0f0f0;
    font-weight: bold;
}

.header {
    background: #e0e0e0;
    font-weight: bold;
}

.disponivel {
    background: #e8f5e9;
}
</style>
</head>

<body>

<header>
    img/dra_mairavilela.jpg
    <div>
        <h1>Dra. Maíra Vilela</h1>
        <p>Cirurgiã Vascular – Brasília</p>
        <p>(61) 98589‑5499</p>
    </div>
</header>

<nav>
    <button onclick="abrirAgendaLogin()">Agenda</button>
    <button onclick="abrirProntuarioLogin()">Prontuários</button>
</nav>

<!-- LOGIN AGENDA -->
<section id="agendaLogin" class="active">
    <h2>Agenda – Acesso</h2>
    <label>Senha:</label><br>
    <input type="password" id="senhaAgenda"><br><br>
    <button onclick="entrarAgenda()">Entrar</button>
</section>

<!-- AGENDA -->
<section id="agenda">
    <h2>Agenda – Próximas 2 semanas</h2>
    <div id="calendar"></div>
</section>

<!-- LOGIN PRONTUÁRIO -->
<section id="prontuarioLogin">
    <h2>Prontuários – Acesso</h2>
    <label>Senha:</label><br>
    <input type="password" id="senhaProntuario"><br><br>
    <button onclick="entrarProntuario()">Entrar</button>
</section>

<!-- PRONTUÁRIO (placeholder) -->
<section id="prontuario">
    <h2>Prontuário do Paciente</h2>
    <p>✔️ Acesso ao prontuário liberado.</p>
    <p>(Campos completos entram no próximo passo)</p>
</section>

<script>
/* SENHAS */
const SENHA_AGENDA = "agenda123";
const SENHA_PRONTUARIO = "prontuario123";

/* CONTROLE DE TELAS */
function mostrar(id){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* AGENDA */
function abrirAgendaLogin(){
    mostrar("agendaLogin");
}

function entrarAgenda(){
    if (senhaAgenda.value === SENHA_AGENDA) {
        mostrar("agenda");
        gerarAgenda();
    } else {
        alert("Senha incorreta");
    }
}

/* PRONTUÁRIO */
function abrirProntuarioLogin(){
    mostrar("prontuarioLogin");
}

function entrarProntuario(){
    if (senhaProntuario.value === SENHA_PRONTUARIO) {
        mostrar("prontuario");
    } else {
        alert("Senha incorreta");
    }
}

/* CALENDÁRIO */
function gerarAgenda(){
    const calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    const hoje = new Date();
    const dias = [];

    for (let i = 0; i < 14; i++) {
        const d = new Date(hoje);
        d.setDate(d.getDate() + i);
        dias.push(d);
    }

    calendar.appendChild(document.createElement("div"));

    dias.forEach(d => {
        const h = document.createElement("div");
        h.className = "cell header";
        h.innerText = d.toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"2-digit"});
        calendar.appendChild(h);
    });

    for (let h = 8; h <= 18; h++) {
        const hora = document.createElement("div");
        hora.className = "cell hora";
        hora.innerText = h + ":00";
        calendar.appendChild(hora);

        dias.forEach(() => {
            const c = document.createElement("div");
            c.className = "cell disponivel";
            calendar.appendChild(c);
        });
    }
}
</script>

</body>
</html>
