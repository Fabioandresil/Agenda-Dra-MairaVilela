<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agenda da Dra. Maíra Vilela</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f2f6fa;
    color: #2c3e50;
}

/* ===== HEADER ===== */
header {
    background: linear-gradient(135deg, #1e90ff, #1c5fa8);
    color: white;
    padding: 30px;
    display: flex;
    align-items: center;
    gap: 25px;
}

header img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    background: white;
}

header h1 {
    margin: 0;
    font-size: 26px;
}

header p {
    margin: 4px 0;
    font-size: 14px;
}

/* ===== MENU ===== */
nav {
    background: white;
    padding: 15px;
    display: flex;
    gap: 20px;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.1);
}

nav button {
    padding: 10px 22px;
    border: none;
    background: #1e90ff;
    color: white;
    border-radius: 25px;
    cursor: pointer;
}

nav button:hover {
    background: #155fa0;
}

/* ===== CONTEÚDO ===== */
main {
    padding: 30px;
}

section {
    display: none;
    background: white;
    padding: 25px;
    border-radius: 10px;
    max-width: 950px;
    margin: auto;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
}

section.active {
    display: block;
}

h2 {
    margin-top: 0;
}

/* ===== FORM ===== */
label {
    display: block;
    margin-top: 12px;
    font-weight: 500;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}

button.action {
    margin-top: 20px;
    padding: 10px 18px;
    border: none;
    background: #1e90ff;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* ===== FICHÁRIO ===== */
.ficha {
    background: #f7f9fc;
    border-left: 6px solid #1e90ff;
    padding: 15px;
    border-radius: 6px;
    margin-bottom: 15px;
}

.ficha h4 {
    margin: 0 0 10px;
    color: #1e90ff;
}
</style>
</head>

<body>

<header>
    <img src="img/dra_mairavilela.jpg" alt="Dra. Maíra Vilela">
    <div>
        <h1>Dra. Maíra Vilela</h1>
        <p>Cirurgiã Vascular</p>
        <p>Brasília – DF</p>
        <p>📞 (61) 98589‑5499</p>
    </div>
</header>

<nav>
    <button onclick="abrirAgenda()">Agenda</button>
    <button onclick="abrirLoginProntuario()">Prontuários</button>
</nav>

<main>

<!-- ✅ AGENDA -->
<section id="agenda" class="active">
    <h2>📅 Agenda da Dra. Maíra Vilela</h2>

    <label>Senha da Agenda</label>
    <input type="password" id="senhaAgenda">
    <button class="action" onclick="acessarAgenda()">Entrar</button>
</section>

<!-- ✅ LOGIN PRONTUÁRIO -->
<section id="loginProntuario">
    <h2>🔐 Acesso aos Prontuários</h2>

    <label>Senha do Prontuário</label>
    <input type="password" id="senhaProntuario">
    <button class="action" onclick="liberarProntuario()">Entrar</button>
</section>

<!-- ✅ PRONTUÁRIO -->
<section id="prontuario">
    <h2>📁 Prontuário do Paciente</h2>

    <label>ID do Paciente</label>
    <input id="idPaciente">

    <label>Data</label>
    <input type="date" id="dataRegistro">

    <label>Sintomas</label>
    <textarea id="sintomas"></textarea>

    <label>Diagnóstico</label>
    <textarea id="diagnostico"></textarea>

    <label>Tratamento</label>
    <textarea id="tratamento"></textarea>

    <button class="action" onclick="salvarProntuario()">Salvar Prontuário</button>

    <hr>
    <h3>📚 Fichário (por data)</h3>
    <div id="historico"></div>
</section>

</main>

<script>
const SENHA_AGENDA = "agenda123";
const SENHA_PRONTUARIO = "prontuario123";

function esconderTudo() {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
}

function abrirAgenda() {
    esconderTudo();
    document.getElementById("agenda").classList.add("active");
}

function abrirLoginProntuario() {
    esconderTudo();
    document.getElementById("loginProntuario").classList.add("active");
}

function acessarAgenda() {
    if (senhaAgenda.value === SENHA_AGENDA) {
        alert("Agenda liberada.");
    } else {
        alert("Senha incorreta.");
    }
}

function liberarProntuario() {
    if (senhaProntuario.value === SENHA_PRONTUARIO) {
        esconderTudo();
        document.getElementById("prontuario").classList.add("active");
        carregarHistorico();
    } else {
        alert("Senha incorreta.");
    }
}

function salvarProntuario() {
    const id = idPaciente.value.trim();
    if (!id) return alert("Informe o ID do paciente.");

    let dados = JSON.parse(localStorage.getItem(id)) || [];
    dados.push({
        data: dataRegistro.value,
        sintomas: sintomas.value,
        diagnostico: diagnostico.value,
        tratamento: tratamento.value
    });

    dados.sort((a,b)=>b.data.localeCompare(a.data));
    localStorage.setItem(id, JSON.stringify(dados));
    carregarHistorico();
}

function carregarHistorico() {
    const id = idPaciente.value;
    const div = document.getElementById("historico");
    div.innerHTML = "";
    const dados = JSON.parse(localStorage.getItem(id)) || [];

    dados.forEach(r => {
        const f = document.createElement("div");
        f.className = "ficha";
        f.innerHTML = `<h4>${r.data}</h4>
                       <strong>Sintomas:</strong> ${r.sintomas}<br>
                       <strong>Diagnóstico:</strong> ${r.diagnostico}<br>
                       <strong>Tratamento:</strong> ${r.tratamento}`;
        div.appendChild(f);
    });
}
</script>

</body>
</html>
